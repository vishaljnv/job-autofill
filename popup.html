<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormFill AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e1a;
      --surface: #1a1a2e;
      --border: rgba(232,213,183,0.12);
      --gold: #c4a97d;
      --gold-light: #e8d5b7;
      --gold-dim: #8a7560;
      --text: #e8d5b7;
      --text-dim: #a08060;
      --green: #22c55e;
      --blue: #60a5fa;
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Source Serif 4', Georgia, serif;
      min-height: 280px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #1a1a2e, #16213e);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--gold);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--bg);
      font-size: 14px;
      font-weight: 700;
    }

    .logo-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.01em;
    }

    .settings-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--gold-dim);
      width: 28px;
      height: 28px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, border-color 0.15s;
    }

    .settings-btn:hover {
      color: var(--gold);
      border-color: var(--gold);
    }

    /* Status */
    .status-bar {
      padding: 10px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.warn { background: #f59e0b; }
    .status-dot.error { background: #ef4444; }

    .status-text { color: var(--text-dim); }

    /* Main content */
    .main {
      padding: 16px 18px;
    }

    /* Profile summary */
    .profile-summary {
      margin-bottom: 16px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 8px;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .profile-chip {
      background: rgba(196,169,125,0.08);
      border: 1px solid rgba(196,169,125,0.15);
      border-radius: 6px;
      padding: 5px 9px;
      font-size: 11px;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .profile-chip strong {
      color: var(--gold-dim);
      font-weight: 400;
      display: block;
      font-size: 10px;
    }

    .profile-empty {
      color: var(--text-dim);
      font-size: 12px;
      font-style: italic;
      padding: 8px 0;
    }

    /* Autofill button */
    .autofill-btn {
      width: 100%;
      padding: 13px;
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 10px;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.15s;
      margin-bottom: 10px;
    }

    .autofill-btn:hover {
      background: var(--gold-light);
      transform: translateY(-1px);
    }

    .autofill-btn:active {
      transform: translateY(0);
    }

    .autofill-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .stat-card {
      flex: 1;
      background: rgba(196,169,125,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      text-align: center;
    }

    .stat-num {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 1px;
    }

    /* Footer */
    .footer {
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-link {
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer-link:hover {
      color: var(--gold);
    }

    /* Warning banner */
    .warning-banner {
      margin: 0 18px 14px;
      padding: 10px 12px;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 8px;
      font-size: 11.5px;
      color: #fbbf24;
      display: none;
    }

    .warning-banner.visible { display: block; }
    
    .warning-banner a {
      color: #fde68a;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <span class="logo-text">FormFill AI</span>
    </div>
    <button class="settings-btn" id="settingsBtn" title="Settings">⚙</button>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Checking...</span>
  </div>

  <div class="warning-banner" id="warningBanner">
    ⚠ <span id="warningText"></span>
  </div>

  <div class="main">
    <div class="profile-summary">
      <div class="section-label">Your Profile</div>
      <div class="profile-grid" id="profileGrid">
        <div class="profile-empty">No profile data yet.</div>
      </div>
    </div>

    <button class="autofill-btn" id="autofillBtn">
      <span>✦</span> Autofill This Page
    </button>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-num" id="statFields">0</div>
        <div class="stat-label">Fields known</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statSites">0</div>
        <div class="stat-label">Sites learned</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statProfile">0</div>
        <div class="stat-label">Profile items</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <a class="footer-link" id="setupLink">Setup Wizard</a>
    <a class="footer-link" id="exportLink">Export Data</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
